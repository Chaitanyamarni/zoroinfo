<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Player Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        h1 {
            color: #333;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: left;
        }
        .info {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Free Fire Player Info</h1>

    <input type="text" id="uidInput" placeholder="Enter Player UID">
    <button onclick="fetchPlayerInfo()">Get Info</button>

    <div id="result"></div>

    <script>
        async function fetchPlayerInfo() {
            const uid = document.getElementById('uidInput').value.trim();
            if (!uid) {
                alert("Please enter a UID");
                return;
            }

            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://zoroinfo-one.vercel.app/api/player-info?id=' + uid)}`;

            document.getElementById('result').innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents);

                if (data.status !== "success") {
                    document.getElementById('result').innerHTML = `<p class="info">Error: ${data.message || "Player not found"}</p>`;
                    return;
                }

                const player = data.player;

                document.getElementById('result').innerHTML = `
                    <div class="info"><strong>Nickname:</strong> ${player.nickname}</div>
                    <div class="info"><strong>Level:</strong> ${player.level}</div>
                    <div class="info"><strong>Rank:</strong> ${player.rank}</div>
                    <div class="info"><strong>Likes:</strong> ${player.likes}</div>
                    <div class="info"><strong>Guild Name:</strong> ${player.guildName || "None"}</div>
                `;
            } catch (error) {
                console.error(error);
                document.getElementById('result').innerHTML = `<p class="info">Error fetching data.</p>`;
            }
        }
    </script>

</body>
</html>
